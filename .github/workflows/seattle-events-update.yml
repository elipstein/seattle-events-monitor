name: Update Seattle Events Monitor

on:
  schedule:
    # ~6am Pacific (UTC-7/-8 depending on DST) - daily refresh
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: Fetch and rebuild events data
        working-directory: scripts
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
        run: python run_all.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/events.ics
          git diff --cached --quiet || git commit -m "Update Seattle events data"
          git push
